services:
  db:
    image: pgvector/pgvector:pg16
    container_name: ufptrade-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: utpistoia
    ports:
      - "5432:5432"
    volumes:
      - ufptrade_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d utpistoia"]
      interval: 5s
      timeout: 5s
      retries: 15

  redis:
    image: redis:7-alpine
    container_name: ufptrade-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - ufptrade_redis:/data

volumes:
  ufptrade_pg:
  ufptrade_redis:
